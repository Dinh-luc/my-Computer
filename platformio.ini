; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-wroom-1-n16r8]
platform = espressif32@6.5.0
board = esp32-s3-wroom-1-n16r8
framework = arduino
monitor_speed = 115200
monitor_echo = yes
upload_speed = 921600
upload_protocol = esptool
monitor_rts = 0
monitor_dtr = 0
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.flash_freq = 80m
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram = enabled
board_build.psram_type = quad
build_flags = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DCONFIG_SPIRAM_SUPPORT=1
	-DCONFIG_SPIRAM_MODE_OPI=1
	-DCONFIG_SPIRAM_TYPE_AUTO=1
	-DCONFIG_ESP32S3_DATA_CACHE_64KB=1
	-DCONFIG_ESP32S3_DATA_CACHE_LINE_64B=1
board_build.partitions = partitions/huge_app.csv
lib_deps = 
	espressif/esp32-camera@^2.0.4
	adafruit/RTClib@^2.1.4
	adafruit/Adafruit GFX Library@^1.12.3
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	chris--a/Keypad@^3.1.1
	bodmer/TFT_eSPI@^2.5.43
	adafruit/Adafruit NeoPixel@^1.15.2
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit MPU6050@^2.2.6
	bodmer/TJpg_Decoder@^1.1.0
	mathieucarbou/AsyncTCP @ ^3.2.4
	mathieucarbou/ESPAsyncWebServer @ ^3.3.17
	bitbank2/PNGdec@^1.1.6
